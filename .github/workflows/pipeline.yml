name: Retail ETL Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run pipeline
      - name: Run ETL Pipeline
        run: |
          python src/pipeline.py

      # 5. Upload output
      - name: Upload output file
        uses: actions/upload-artifact@v4
        with:
          name: final-sales-data
          path: output/

      # 6. Upload logs
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/

      # 7. Success message
      - name: Success
        if: success()
        run: echo "Pipeline executed successfully"

      # 8. Failure message
      - name: Failure
        if: failure()
        run: echo "Pipeline failed"